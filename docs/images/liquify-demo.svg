<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">Liquify push demo</title>
  <desc id="desc">Right mouse push deformation demonstration for ASCII characters.</desc>
  <defs>
    <radialGradient id="push" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.24"/>
      <stop offset="70%" stop-color="#f97316" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f97316"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="980" height="520" rx="18" fill="#fbfaf7"/>
  <text x="44" y="58" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#111827">液化示意图 / Liquify Push Demo</text>
  <text x="44" y="92" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#4b5563">Right mouse drag applies a local force field; nodes move outward and spring back after release.</text>

  <g transform="translate(345 126)" filter="url(#shadow)">
    <rect x="0" y="0" width="300" height="300" rx="12" fill="#111827"/>
    <circle cx="150" cy="152" r="112" fill="url(#push)"/>
    <text x="58" y="70" font-family="Consolas, monospace" font-size="13" fill="#d1d5db">....@@@@@@@@@@@@....</text>
    <text x="54" y="91" font-family="Consolas, monospace" font-size="13" fill="#d1d5db">..@@@@@######@@@@@..</text>
    <text x="50" y="112" font-family="Consolas, monospace" font-size="13" fill="#d1d5db">.@@@###******###@@@.</text>
    <text x="47" y="133" font-family="Consolas, monospace" font-size="13" fill="#d1d5db">@@##**++    ++**##@@</text>
    <text x="36" y="154" font-family="Consolas, monospace" font-size="13" fill="#d1d5db">@@##**+      +**##@@</text>
    <text x="47" y="175" font-family="Consolas, monospace" font-size="13" fill="#d1d5db">@@##**++    ++**##@@</text>
    <text x="50" y="196" font-family="Consolas, monospace" font-size="13" fill="#d1d5db">.@@@###******###@@@.</text>
    <text x="54" y="217" font-family="Consolas, monospace" font-size="13" fill="#d1d5db">..@@@@@######@@@@@..</text>
    <text x="58" y="238" font-family="Consolas, monospace" font-size="13" fill="#d1d5db">....@@@@@@@@@@@@....</text>
    <circle cx="150" cy="154" r="14" fill="#f97316"/>
    <text x="132" y="158" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#fff">RMB</text>
  </g>

  <path d="M 490 279 L 420 210" stroke="#f97316" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M 490 279 L 560 210" stroke="#f97316" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M 490 279 L 405 320" stroke="#f97316" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M 490 279 L 575 320" stroke="#f97316" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)"/>

  <text x="80" y="222" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">Push field / 推开力场</text>
  <text x="80" y="256" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#4b5563">Characters near the cursor move farther.</text>
  <text x="80" y="280" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#4b5563">越靠近鼠标，字符位移越明显。</text>

  <text x="690" y="222" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">Spring back / 弹性回弹</text>
  <text x="690" y="256" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#4b5563">Velocity and damping restore the shape.</text>
  <text x="690" y="280" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#4b5563">速度和阻尼让图像逐步回到原位。</text>
</svg>
